---
layout: default
---
<article class="pillar-page">
  <div class="content-container">

    <header class="pillar-hero">
      <h1>{{ page.title }}</h1>
      <p class="pillar-intro">{{ page.intro }}</p>
    </header>

    {% if page.toc %}
    <nav class="pillar-toc" aria-label="On this page">
      <h2 class="toc-heading">On This Page</h2>
      <ul class="toc-list">
        {% for item in page.toc %}
        <li><a href="#{{ item.id }}">{{ item.label }}</a></li>
        {% endfor %}
      </ul>
    </nav>
    {% endif %}

    <div class="pillar-content">
      {{ content }}
    </div>

  </div>
</article>
